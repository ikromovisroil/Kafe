{% extends 'base.html' %}
{% block content %}
 <main id="main" class="main">

    <section class="section mt-3">
        <div class="card">
            <div class="card-body">
              <h5 class="card-title">Stol,Kabina qo'shish</h5>

              <!-- Horizontal Form -->
              <form method="POST">
                {% csrf_token %}
                <div class="row mb-3">
                  <label for="id_nomi" class="col-sm-2 col-form-label">Nomi</label>
                  <div class="col-sm-10">
                    <input type="text" class="form-control" name="nomi" required="" id="id_nomi">
                  </div>
                </div>
                <div class="text-center">
                  <button type="submit" class="btn btn-primary">Qo'shish</button>
                </div>
              </form><!-- End Horizontal Form -->

            </div>
          </div>
    </section>

    <section class="section">
      <div class="row">
        <div class="col-lg-12">

          <div class="card">
            <div class="card-body">
              <h5 class="card-title"> Stol va Kabinalar </h5>
                <div class="datatable-container">
    <table class="table datatable datatable-table">
        <thead>
        <tr>
            <th>Soni</th>
            <th>Nomi</th>
            <th>O'chirish</th>
        </tr>
        </thead>
        <tbody>
        {% for i in stol %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.nomi}}</td>
            <td> <a class="btn btn-danger" href="{% url 'stol_delete' i.id %}"><i class="ri-delete-bin-line"></i></a></td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
                <div class="datatable-bottom">
    <nav class="datatable-pagination"><ul class="datatable-pagination-list"></ul></nav>
</div>

            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

{% endblock content %}
