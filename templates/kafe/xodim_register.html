{% extends 'base.html' %}
{% block content %}
 <main id="main" class="main">

    <section class="section mt-3">
        <div class="card">
            <div class="card-body">
              <h5 class="card-title">Maxsulot qo'shish</h5>

              <!-- Horizontal Form -->
              <form method="POST">
                {% csrf_token %}
                <div class="row mb-3">
                      <label for="id_rol" class="col-sm-2 col-form-label">Rol:</label>
                   <div class="col-sm-10">
                      <select name="rol" id="id_rol" class="form-select">
                        <option selected="">? ? ? ? ?</option>
                        {% for i in rol %}
                        <option value="{{i.id}}">{{i.nomi}}</option>
                        {% endfor %}
                      </select>
                   </div>
                </div>

                <div class="row mb-3">
                  <label for="id_username" class="col-sm-2 col-form-label"> Login : </label>
                  <div class="col-sm-10">
                    <input type="text" class="form-control" name="username" id="id_username">
                  </div>
                </div>

                <div class="row mb-3">
                  <label for="id_password1" class="col-sm-2 col-form-label"> Parol : </label>
                  <div class="col-sm-10">
                    <input type="password" class="form-control" name="password1" id="id_password1">
                  </div>
                </div>

                <div class="row mb-3">
                  <label for="id_password2" class="col-sm-2 col-form-label">Parolni tasdiqlang:</label>
                  <div class="col-sm-10">
                    <input type="password" class="form-control" name="password2" id="id_password2">
                  </div>
                </div>

                <div class="text-center">
                  <button type="submit" class="btn btn-primary">Qo'shish</button>
                </div>
              </form><!-- End Horizontal Form -->

            </div>
          </div>
    </section>

    <section class="section">
      <div class="row">
        <div class="col-lg-12">

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Xodimlar</h5>
                <div class="datatable-container">
    <table class="table datatable datatable-table">
        <thead>
        <tr>
            <th>#</th>
            <th>Roli</th>
            <th>Login</th>
            <th>Parol</th>
            <th>O'chirish</th>
        </tr>
        </thead>
        <tbody>
        {% for i in user %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.rol}}</td>
            <td>{{i.username}}</td>
            <td>{{i.parol}}</td>
            <td> <a class="btn btn-danger" href="{% url 'xodim_delete' i.id %}"><i class="ri-delete-bin-line"></i></a></td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
                <div class="datatable-bottom">
    <nav class="datatable-pagination"><ul class="datatable-pagination-list"></ul></nav>
</div>

            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

{% endblock content %}
